<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1 class="h1-title">Pokemon Viewer</h1><br>
  <div class="search-bar">
    <input type="search" placeholder="Enter Pokemon Name" id="search-input">
    <button id="submit-button">Submit</button>
    <div id="search-results"></div>
  </div>
  <p id="error-message"></p>
  <div class="pokemon-container" id="pokemon-container">
    <div class="pokemon-image-container">
      <img id="pokemon-image">
      <button id="shiny-button">Shiny Form</button>
    </div>
    <div class="pokemon-info">
      <h2 id="pokemon-name"></h2>
      <p>
        <strong>ID:</strong>
        <span id="pokemon-id"></span>
      </p>
      <p>
        <strong>Height:</strong>
        <span id="pokemon-height"></span>
      </p>
      <p>
        <strong>Weight:</strong>
        <span id="pokemon-weight"></span>
      </p>
      <p>
        <strong>Type:</strong>
        <span id="pokemon-types"></span>
      </p>
    </div>
    <script src="indexs.js" defer></script>
</body>

</html>
